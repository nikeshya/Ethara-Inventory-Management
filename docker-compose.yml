version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ethara_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethara_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/inventory_db
      - CORS_ORIGINS=["http://localhost:3000","http://127.0.0.1:3000"]
      - DEBUG=False
    depends_on:
      postgres:
        condition: service_healthy
    # Run migrations and start app
    command: >
      bash -c "alembic upgrade head && python seed.py || echo 'Seeding skipped/failed' && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # For production Docker compose, we route through localhost
        - VITE_API_URL=http://localhost:8000/api/v1
    container_name: ethara_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
